<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#9a7016">
<title>STFD Estimate</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d0f14;--s1:#141720;--s2:#1c2030;--s3:#242840;--border:#2a2f45;--accent:#c8922a;--green:#22c55e;--red:#ef4444;--text:#ffffff;--muted:#94a3b8;--dim:#4a5070}
html[data-theme="light"]{--bg:#f4f6fb;--s1:#ffffff;--s2:#eef2f8;--s3:#e4e9f2;--border:#d3dbe8;--accent:#9a7016;--green:#15803d;--red:#dc2626;--text:#14203a;--muted:#5a6a86;--dim:#9aa6bb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased}
.app-hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px}
.brand-logo{height:50px;width:auto;display:block}
.brand-name{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--accent);letter-spacing:1px;font-size:24px}
.app-hdr .spacer{flex:1}
.icon-btn{background:none;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px}
.btn{font-family:inherit;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;padding:10px 16px;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text)}
.btn-green{background:var(--green);color:#fff}
.wrap{max-width:900px;margin:0 auto;padding:18px 16px 60px}
.doc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:26px}
/* letterhead */
.letterhead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:2px solid var(--accent);padding-bottom:16px;margin-bottom:18px}
.lh-logo{height:74px;width:auto}
.co-block{text-align:right;font-size:12.5px;line-height:1.55;color:var(--muted)}
.co-block .co-name{font-weight:700;color:var(--text);font-size:14px;display:block;margin-bottom:2px}
.doc-title{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--accent);letter-spacing:2px;margin:2px 0 16px}
/* sections */
.sec{margin-bottom:18px}
.sec-h{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.fg input,.fg select,.fg textarea{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:7px;font-family:inherit;font-size:14px;outline:none;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{min-height:64px;resize:vertical}
/* pull-from-diagram */
.pull-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;background:var(--s2);border:1px dashed var(--border);border-radius:10px;padding:12px}
.pull-row .fg{flex:1;min-width:180px;margin:0}
/* line items */
table.lines{width:100%;border-collapse:collapse;font-size:13.5px}
table.lines th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:6px 6px;border-bottom:1px solid var(--border)}
table.lines td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
table.lines input{background:transparent;border:1px solid transparent;color:var(--text);font-family:inherit;font-size:13.5px;padding:6px 6px;border-radius:6px;width:100%}
table.lines input:hover{border-color:var(--border)}
table.lines input:focus{border-color:var(--accent);background:var(--s2);outline:none}
.col-desc{width:44%}.col-unit{width:9%}.col-qty{width:11%}.col-rate{width:14%}.col-amt{width:16%;text-align:right;font-variant-numeric:tabular-nums}.col-x{width:6%;text-align:center}
.amt-cell{text-align:right;font-variant-numeric:tabular-nums;padding-right:10px}
.rm{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px}.rm:hover{color:var(--red)}
.src-tag{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-left:4px}
.add-line{margin-top:8px}
.rev-item{font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--border)}
.rev-date{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:12px;margin-right:6px}
.rev-amt{color:var(--muted);font-size:12px}
/* totals */
.totals{margin-left:auto;max-width:320px;margin-top:14px}
.tot-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.tot-row.grand{border-top:2px solid var(--accent);margin-top:4px;padding-top:10px;font-weight:700;font-size:17px}
.tot-row .lbl{color:var(--muted)}
.tot-row input{width:90px;text-align:right;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 6px;font-family:inherit}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);background:var(--s3);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:10px;font-size:14px;z-index:200;transition:transform .25s;max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--red);color:var(--red)}
.stamp{text-align:center;color:var(--dim);font-size:11px;margin-top:20px;font-family:'IBM Plex Mono',monospace}
.hide{display:none!important}
@media print{
  .app-hdr,.no-print,.pull-row,.add-line,.rm,.col-x,#toast{display:none!important}
  body{background:#fff;color:#000}
  .wrap{max-width:100%;padding:0}
  .doc{border:none;border-radius:0;padding:0}
  table.lines input{border:none!important;background:transparent!important;color:#000!important}
  .fg input,.fg select,.fg textarea{border:none!important;background:transparent!important;color:#000!important;padding:2px 0!important}
  .fg label{color:#555}
}
</style>
</head>

          <div class="fg"><label>Phone</label><input id="c_phone"></div>
          <div class="fg"><label>Email</label><input id="c_email"></div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-h">Estimate details</div>
        <div class="grid2">
          <div class="fg"><label>Estimate #</label><input id="e_number"></div>
          <div class="fg"><label>Date</label><input id="e_date" type="date"></div>
        </div>
        <div class="grid2">
          <div class="fg"><label>Valid until</label><input id="e_expiry" type="date"></div>
          <div class="fg"><label>Job type</label><select id="e_jobtype"><option value="">—</option><option>Wood Privacy</option><option>Chain Link</option><option>Decorative Metal</option><option>Deck</option><option>Repair</option><option>Pergola</option><option>Automatic / Electronic Gate</option><option>Ornamental / Iron Fence</option><option>Patio Cover / Arbor</option><option>Carport</option><option>Other</option></select></div>
        </div>
        <div class="grid2">
          <div class="fg"><label>Sales rep</label><select id="e_rep"><option value="">—</option></select></div>
          <div class="fg"><label>Commission rate</label><select id="e_comm"><option value="0.08">8%</option><option value="0.06">6%</option></select></div>
        </div>
      </div>
    </div>

    <!-- pull from diagram -->
    <div class="sec no-print">
      <div class="sec-h">Materials from fence diagram</div>
      <div class="pull-row">
        <div class="fg"><label>Customer's fence diagrams</label><select id="quotePick"><option value="">— none loaded —</option></select></div>
        <button class="btn btn-ghost" onclick="pullFromDiagram()">Pull materials →</button>
        <button class="btn btn-ghost" onclick="loadQuotes(true)" style="font-size:12px">Show all unlinked</button>
      </div>
    </div>

    <!-- line items -->
    <div class="sec">
      <div class="sec-h">Line items</div>
      <table class="lines">
        <thead><tr>
          <th class="col-desc">Description</th><th class="col-unit">Unit</th><th class="col-qty">Qty</th>
          <th class="col-rate">Rate</th><th class="col-amt">Amount</th><th class="col-x"></th>
        </tr></thead>
        <tbody id="lineBody"></tbody>
      </table>
      <div class="add-line">
        <button class="btn btn-ghost" onclick="addLine('labor')">+ Labor</button>
        <button class="btn btn-ghost" onclick="addLine('other')">+ Line item</button>
      </div>

      <div class="totals">
        <div class="tot-row"><span class="lbl">Subtotal</span><span id="t_subtotal">$0.00</span></div>
        <div class="tot-row"><span class="lbl">Tax <input id="t_taxrate" type="number" step="0.001" value="8.25" oninput="recalc()">%</span><span id="t_tax">$0.00</span></div>
        <div class="tot-row grand"><span>Total</span><span id="t_total">$0.00</span></div>
      </div>
    </div>

    <!-- change orders -->
    <div class="sec" id="changeOrderSec" style="display:none">
      <div class="sec-h">Change orders</div>
      <div id="revLog"></div>
      <div class="fg" id="changeNoteWrap" style="display:none;margin-top:10px"><label>Change order note (what changed in this revision)</label><textarea id="changeNote" placeholder="e.g. added 25 ft of chain link; changed color green to black"></textarea></div>
    </div>

    <!-- terms -->
    <div class="sec">
      <div class="sec-h">Terms &amp; notes</div>
      <div class="fg"><textarea id="e_notes" placeholder="Payment terms, scope notes, exclusions…"></textarea></div>
    </div>
  </div>

  <div class="stamp">build 2026-07-07e</div>
</div>

<div id="toast"></div>

<script>
var SB_URL='https://qdfwovnhlaaocgawukto.supabase.co';
var SB_KEY='sb_publishable_PPhYAvIRNnzv7E86s8yw-g_ltVx0Gvk';
var sb=supabase.createClient(SB_URL,SB_KEY);

var params=new URLSearchParams(location.search);
var customerId=params.get('customer_id')||null;
var quotes=[];         // customer's fence_quotes
var lines=[];          // line items
var linkedQuoteId=null;
var customerName='';
var editingId=params.get('estimate_id')||null;
var loadedEstimate=null;
var origTotal=0;
var origLinesJSON='[]';

var $=function(id){return document.getElementById(id);};
function toast(m,e){var t=$('toast');t.textContent=m;t.className='show'+(e?' err':'');clearTimeout(t._h);t._h=setTimeout(function(){t.className='';},2600);}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function round2(n){return Math.round(n*100)/100;}
function money(n){return '$'+(num(n)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(m){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];});}

// theme
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);$('themeBtn').textContent=(t==='light')?'🌙':'☀';try{localStorage.setItem('stfd-est-theme',t);}catch(e){}}
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'light';applyTheme(c==='light'?'dark':'light');}
(function(){var t='light';try{var s=localStorage.getItem('stfd-est-theme');if(s)t=s;}catch(e){}applyTheme(t);})();

function printDoc(){var t=$('toast'); if(t)t.className=''; setTimeout(function(){window.print();},60);}

// ---- line items ----
function renderLines(){
  var b=$('lineBody');
  if(!lines.length){ b.innerHTML='<tr><td colspan="6" style="color:var(--dim);padding:14px 6px">No line items yet — pull from a diagram or add labor/line items below.</td></tr>'; recalc(); return; }
  b.innerHTML=lines.map(function(l,i){
    return '<tr>'
      +'<td class="col-desc"><input value="'+esc(l.description)+'" oninput="upd('+i+',\'description\',this.value)"><span class="src-tag">'+esc(l.source||'')+'</span></td>'
      +'<td class="col-unit"><input value="'+esc(l.unit||'')+'" oninput="upd('+i+',\'unit\',this.value)"></td>'
      +'<td class="col-qty"><input type="number" step="any" value="'+esc(l.quantity)+'" oninput="upd('+i+',\'quantity\',this.value)"></td>'
      +'<td class="col-rate"><input type="number" step="any" value="'+esc(l.rate)+'" oninput="upd('+i+',\'rate\',this.value)"></td>'
      +'<td class="col-amt amt-cell" id="amt-'+i+'">'+money(l.amount)+'</td>'
      +'<td class="col-x"><button class="rm no-print" onclick="rmLine('+i+')">✕</button></td>'
      +'</tr>';
  }).join('');
  recalc();
}
function upd(i,f,v){
  if(!lines[i])return;
  lines[i][f]=(f==='quantity'||f==='rate')?num(v):v;
  if(f==='quantity'||f==='rate'){ lines[i].amount=round2(num(lines[i].quantity)*num(lines[i].rate)); var c=$('amt-'+i); if(c)c.textContent=money(lines[i].amount); }
  recalc();
}
function addLine(kind){ lines.push({description:'',unit:(kind==='labor'?'hr':'ea'),quantity:1,rate:0,amount:0,sku:'',source:kind}); renderLines(); }
function rmLine(i){ lines.splice(i,1); renderLines(); }
function recalc(){
  var sub=0; lines.forEach(function(l){ sub+=num(l.amount); });
  var rate=num($('t_taxrate').value)/100;
  var tax=round2(sub*rate);
  $('t_subtotal').textContent=money(sub);
  $('t_tax').textContent=money(tax);
  $('t_total').textContent=money(round2(sub+tax));
}

// ---- diagram pull ----
function pullFromDiagram(){
  var qid=$('quotePick').value; var q=null;
  for(var i=0;i<quotes.length;i++){ if(quotes[i].id===qid) q=quotes[i]; }
  if(!q){ toast('Pick a diagram first',true); return; }
  var bom=q.bom;
  var items=Array.isArray(bom)?bom:((bom&&(bom.items||bom.materials||bom.lines))||[]);
  if(!items.length){ toast('That diagram has no materials',true); return; }
  var added=0;
  items.forEach(function(m){
    if(m && (m.v!=null) && (m.qty==null && m.quantity==null)) return; // skip summary rows like {k,v}
    var desc=(m.label||m.description||m.k||'Material'); if(m.detail) desc+=' — '+m.detail;
    var qty=num(m.qty!=null?m.qty:m.quantity);
    var rate=num(m.price!=null?m.price:m.rate);
    lines.push({description:desc,unit:(m.unit||'ea'),quantity:qty,rate:rate,amount:round2(qty*rate),sku:(m.sku||''),source:'material'});
    added++;
  });
  if(customerId && q.customer_id!==customerId){ sb.from('fence_quotes').update({customer_id:customerId}).eq('id',q.id).then(function(){},function(){}); q.customer_id=customerId; }
  linkedQuoteId=q.id;
  renderLines();
  toast(added+' materials pulled from diagram');
}

// ---- save ----
async function saveEstimate(){
  var name=$('c_name').value.trim();
  if(!name){ toast('Customer name is required',true); return; }
  if(!lines.length){ toast('Add at least one line item',true); return; }
  var sub=0; lines.forEach(function(l){ sub+=num(l.amount); });
  var taxrate=num($('t_taxrate').value)/100; var tax=round2(sub*taxrate); var total=round2(sub+tax);
  var payload={
    estimate_number:$('e_number').value.trim()||null,
    customer_id:customerId,
    fence_quote_id:linkedQuoteId,
    customer_name:name,
    customer_address:$('c_address').value.trim()||null,
    customer_city:$('c_city').value.trim()||null,
    customer_state:$('c_state').value.trim()||null,
    customer_zip:$('c_zip').value.trim()||null,
    customer_phone:$('c_phone').value.trim()||null,
    customer_email:$('c_email').value.trim()||null,
    sales_rep:$('e_rep').value||null,
    job_type:$('e_jobtype').value||null,
    commission_rate:num($('e_comm').value),
    line_items:lines,
    subtotal:round2(sub),
    tax_amount:tax,
    total:total,
    pipeline_status:'draft',
    notes:$('e_notes').value.trim()||null,
    estimate_date:$('e_date').value||null,
    expiry_date:$('e_expiry').value||null
  };
  var revs=(loadedEstimate&&Array.isArray(loadedEstimate.revisions))?loadedEstimate.revisions.slice():[];
  if(editingId&&loadedEstimate){
    var changed=(JSON.stringify(lines)!==origLinesJSON)||(round2(total)!==round2(origTotal));
    var cnote=$('changeNote')?$('changeNote').value.trim():'';
    if(changed||cnote){ revs.push({ date:new Date().toISOString().slice(0,10), note:cnote||'(revised)', total_before:round2(origTotal), total_after:round2(total), snapshot:JSON.parse(origLinesJSON) }); }
  }
  payload.revisions=revs;
  var res;
  if(editingId){ res=await sb.from('estimates').update(payload).eq('estimate_id',editingId).select('estimate_id,estimate_number').single(); }
  else { res=await sb.from('estimates').insert(payload).select('estimate_id,estimate_number').single(); }
  if(res.error){ toast('Save failed: '+res.error.message,true); return; }
  if(editingId&&loadedEstimate){ loadedEstimate.total=total; loadedEstimate.line_items=lines; loadedEstimate.revisions=revs; origTotal=total; origLinesJSON=JSON.stringify(lines); if($('changeNote'))$('changeNote').value=''; renderRevisions(revs);
    toast('Estimate updated'+(res.data&&res.data.estimate_number?(' · #'+res.data.estimate_number):'')); }
  else { toast('Estimate saved'+(res.data&&res.data.estimate_number?(' · #'+res.data.estimate_number):'')); }
}

// ---- init ----
async function loadReps(){
  var r=await sb.from('reps').select('rep_id,name,is_active').eq('is_active',true).order('name');
  if(r.error){ toast('Reps: '+r.error.message,true); return; }
  $('e_rep').innerHTML='<option value="">—</option>'+(r.data||[]).map(function(x){return '<option value="'+esc(x.name)+'">'+esc(x.name)+'</option>';}).join('');
}
async function loadCustomer(){
  if(!customerId){ return; }
  var r=await sb.from('customers').select('*').eq('id',customerId).single();
  if(r.error){ toast('Customer: '+r.error.message,true); return; }
  var c=r.data;
  customerName=c.full_name||'';
  $('c_name').value=c.full_name||''; $('c_company').value=c.company_name||'';
  $('c_address').value=c.street_address||''; $('c_city').value=c.city||'';
  $('c_state').value=c.state||'TX'; $('c_zip').value=c.zip_code||'';
  $('c_phone').value=c.phone||''; $('c_email').value=c.email||'';
}
async function loadEstimate(){
  if(!editingId){ return; }
  var r=await sb.from('estimates').select('*').eq('estimate_id',editingId).single();
  if(r.error){ toast('Estimate: '+r.error.message,true); return; }
  var e=r.data; loadedEstimate=e;
  customerId=e.customer_id||customerId; customerName=e.customer_name||'';
  $('c_name').value=e.customer_name||''; $('c_address').value=e.customer_address||'';
  $('c_city').value=e.customer_city||''; $('c_state').value=e.customer_state||'TX'; $('c_zip').value=e.customer_zip||'';
  $('c_phone').value=e.customer_phone||''; $('c_email').value=e.customer_email||'';
  if(e.estimate_number)$('e_number').value=e.estimate_number;
  if(e.estimate_date)$('e_date').value=e.estimate_date;
  if(e.expiry_date)$('e_expiry').value=e.expiry_date;
  $('e_jobtype').value=e.job_type||''; $('e_rep').value=e.sales_rep||'';
  $('e_comm').value=(e.commission_rate!=null?String(e.commission_rate):'0.08');
  $('e_notes').value=e.notes||'';
  linkedQuoteId=e.fence_quote_id||null;
  lines=Array.isArray(e.line_items)?e.line_items.map(function(l){return {description:l.description||'',unit:l.unit||'ea',quantity:num(l.quantity),rate:num(l.rate),amount:num(l.amount!=null?l.amount:(num(l.quantity)*num(l.rate))),sku:l.sku||'',source:l.source||'manual'};}):[];
  origTotal=num(e.total); origLinesJSON=JSON.stringify(lines);
  if(e.tax_amount!=null&&e.subtotal){ $('t_taxrate').value=round2((num(e.tax_amount)/num(e.subtotal))*100); }
  renderLines();
  $('changeOrderSec').style.display=''; $('changeNoteWrap').style.display='';
  renderRevisions(e.revisions||[]);
  if($('saveBtn'))$('saveBtn').textContent='Update estimate';
  var dt=document.querySelector('.doc-title'); if(dt&&e.estimate_number)dt.textContent='ESTIMATE · '+e.estimate_number;
}
function renderRevisions(revs){
  var el=$('revLog'); if(!el)return;
  if(!revs||!revs.length){ el.innerHTML='<div style="color:var(--dim);font-size:13px">No change orders yet. Edit and save to log one.</div>'; return; }
  el.innerHTML=revs.slice().reverse().map(function(r){
    var d=r.date?new Date(r.date+'T12:00:00').toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}):'';
    var chg=(r.total_before!=null&&r.total_after!=null)?(' <span class="rev-amt">'+money(r.total_before)+' → '+money(r.total_after)+'</span>'):'';
    return '<div class="rev-item"><span class="rev-date">'+esc(d)+'</span> '+esc(r.note||'(revised)')+chg+'</div>';
  }).join('');
}
async function loadQuotes(showAll){
  var sel=$('quotePick'); var rows=[];
  var cols='id,drawing_no,client_name,created_at,total,bom,customer_id';
  if(customerId){ var a=await sb.from('fence_quotes').select(cols).eq('customer_id',customerId).order('created_at',{ascending:false}); if(!a.error&&a.data) rows=rows.concat(a.data); }
  if(customerName){ var b=await sb.from('fence_quotes').select(cols).is('customer_id',null).ilike('client_name','%'+customerName+'%').order('created_at',{ascending:false}); if(!b.error&&b.data) rows=rows.concat(b.data); }
  if(showAll){ var c=await sb.from('fence_quotes').select(cols).is('customer_id',null).order('created_at',{ascending:false}).limit(50); if(!c.error&&c.data) rows=rows.concat(c.data); }
  var seen={}; quotes=[]; rows.forEach(function(q){ if(!seen[q.id]){ seen[q.id]=1; quotes.push(q); } });
  if(!quotes.length){ sel.innerHTML='<option value="">— none found — try “Show all unlinked” —</option>'; return; }
  sel.innerHTML='<option value="">— pick a diagram —</option>'+quotes.map(function(q){
    var d=q.created_at?new Date(q.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    var tag=q.customer_id?'':(' · unlinked'+(q.client_name?(' ('+q.client_name+')'):''));
    return '<option value="'+q.id+'">'+esc(q.drawing_no||'Diagram')+' · '+d+' · '+money(q.total)+esc(tag)+'</option>';
  }).join('');
}
(async function init(){
  // defaults
  var today=new Date(); $('e_date').value=today.toISOString().slice(0,10);
  var exp=new Date(today.getTime()+30*86400000); $('e_expiry').value=exp.toISOString().slice(0,10);
  $('e_number').value='E'+today.getFullYear().toString().slice(2)+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1)+(today.getDate()<10?'0':'')+today.getDate()+'-'+Math.floor(Math.random()*9000+1000);
  renderLines();
  try{
    await loadReps();
    if(editingId){ await loadEstimate(); } else { await loadCustomer(); }
    await loadQuotes();
  }
  catch(e){ toast('Startup error: '+(e&&e.message?e.message:e),true); }
})();
</script>
</body>
